# CLG Search — local infrastructure + services.
#
# Quick start (infra only, run apps with `pnpm dev` on host):
#   docker compose up -d postgres redis
#
# Full stack:
#   docker compose up -d
#
# Ollama runs on the HOST. Containers reach it via host.docker.internal.
# The `extra_hosts: host-gateway` entries make that resolve on native Linux
# too (it already works on Docker Desktop for Mac/Windows).

services:
  postgres:
    image: postgres:16-alpine
    container_name: clg-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: clgsearch
    # Default max_connections (100) is fine for 1-2 parallel university crawls
    # but is exhausted at high CRAWL_CONCURRENCY (the API + crawler each hold
    # their own Prisma pool, sized to match — see packages/database/src/client.ts).
    # 300 gives headroom up to ~CRAWL_CONCURRENCY=20-30 across both processes;
    # shared_buffers is bumped a little to match without assuming a big box
    # (it's real allocation, unlike max_connections, so kept modest).
    command: ["postgres", "-c", "max_connections=300", "-c", "shared_buffers=256MB"]
    ports:
      - "${POSTGRES_HOST_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d clgsearch"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: clg-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "${REDIS_HOST_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: clg-api
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/clgsearch
      REDIS_URL: redis://redis:6379
      OLLAMA_BASE_URL: http://host.docker.internal:11434
    ports:
      - "${API_PORT:-4000}:4000"
    volumes:
      - ./storage:/app/storage
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  crawler-worker:
    build:
      context: .
      dockerfile: apps/crawler/Dockerfile
    container_name: clg-crawler
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/clgsearch
      REDIS_URL: redis://redis:6379
      OLLAMA_BASE_URL: http://host.docker.internal:11434
    volumes:
      - ./storage:/app/storage
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: clg-web
    restart: unless-stopped
    env_file: .env
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:${API_PORT:-4000}
    ports:
      - "${WEB_PORT:-3000}:3000"
    depends_on:
      - api

volumes:
  postgres_data:
  redis_data:
